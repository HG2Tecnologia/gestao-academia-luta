<div class="hw">
  @if (open()) {
    <div class="hw-panel">
      <div class="hw-header">
        <div class="hw-header-info">
          <div class="hw-dot"></div>
          <div>
            <div class="hw-title">Central de Ajuda</div>
            <div class="hw-sub">Dúvidas sobre o sistema</div>
          </div>
        </div>
        <button class="hw-close" (click)="toggle()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="hw-body">
        <div class="hw-search-hint">Perguntas frequentes</div>
        <div class="hw-faq-list">
          @for (item of faqs; track $index) {
            <div class="hw-faq-item" [class.hw-faq-open]="faqAberto() === $index">
              <button class="hw-faq-q" (click)="toggleFaq($index)">
                <span>{{ item.q }}</span>
                <svg class="hw-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              @if (faqAberto() === $index) {
                <div class="hw-faq-a">{{ item.a }}</div>
              }
            </div>
          }
        </div>
      </div>

      <div class="hw-footer">
        <div class="hw-footer-label">Não encontrou o que precisava?</div>
        <a
          href="https://wa.me/5521991639889?text=Ol%C3%A1%2C+preciso+de+ajuda+com+o+sistema+Sensei+Manager"
          target="_blank"
          rel="noopener"
          class="hw-wa-btn"
        >
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Suporte via WhatsApp
        </a>
      </div>
    </div>
  }

  <button class="hw-trigger" (click)="toggle()" [class.hw-trigger-open]="open()" title="Ajuda">
    @if (!open()) {
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    } @else {
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    }
  </button>
</div>
