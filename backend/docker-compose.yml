version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: academiafight_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: academiafight
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: academiafight_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: academiafight_api
    restart: unless-stopped
    ports:
      - "5000:80"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=academiafight;Username=postgres;Password=${POSTGRES_PASSWORD}"
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__Issuer: "AcademiaFightAPI"
      Jwt__Audience: "AcademiaFightApp"
      FrontendUrl: ${FRONTEND_URL}
      AllowedOrigins__0: ${FRONTEND_URL}
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT}
      Smtp__User: ${SMTP_USER}
      Smtp__Password: ${SMTP_PASSWORD}
      Smtp__From: ${SMTP_FROM}
      Smtp__FromName: "Academia Fight"

volumes:
  postgres_data:
  redis_data:
